<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Encrypted Chat (Phase 2)</title>
    
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="app.js" defer></script>

    <style>
        #header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .key-box input {
            padding: 5px;
            border-radius: 4px;
            border: none;
}
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        #messages { list-style-type: none; margin: 0; padding: 0; flex-grow: 1; overflow-y: auto; border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; }
        #messages li { padding: 8px; margin-bottom: 5px; background-color: #f1f1f1; border-radius: 5px; }
        #form { display: flex; }
        #input { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #0084ff; color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header-controls">
        <div class="key-box">
            <label>Secret Key:</label>
            <input id="secret-key" type="text" placeholder="Enter room password...">
        </div>
        <div class="user-info">
            <span id="display-name"></span>
        </div>
    </div>

    <ul id="messages"></ul>

    <form id="form" action="">
        <input type="file" id="file-input" accept="image/*, video/*">
        <input id="input" autocomplete="off" placeholder="Type an encrypted message..." />
        <button type="submit">Send</button>
    </form>
</body>
</html>
