<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Encrypted Chat</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="app.js" defer></script>

    <style>
        /* BASE STYLES: Removes default margins so it touches the edge of the phone screen */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background-color: #ece5dd; /* WhatsApp-style background color */
            height: 100dvh; /* 'dvh' accounts for mobile browser address bars */
        }

        /* THE APP CONTAINER: Keeps it from stretching too wide on PC */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px; /* On PC, it stops at 800px. On phone, it's 100% */
            height: 100%;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* HEADER STYLES */
        #header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #202c33;
            color: white;
            padding: 15px;
        }
        
        .key-box { display: flex; align-items: center; gap: 10px; }
        .key-box input { padding: 8px; border-radius: 4px; border: none; outline: none; }

        /* CHAT WINDOW STYLES */
        #messages { 
            list-style-type: none; 
            margin: 0; 
            padding: 15px; 
            flex-grow: 1; 
            overflow-y: auto; 
            background-color: #efeae2;
        }
        #messages li { 
            padding: 10px; 
            margin-bottom: 10px; 
            background-color: white; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word; /* Stops long text from breaking the screen on mobile */
        }

        /* INPUT AREA STYLES */
        #form { 
            display: flex; 
            background: #f0f2f5; 
            padding: 10px; 
            gap: 10px;
        }
        #file-input { width: 90px; } /* Keeps the file button small on mobile */
        #input { 
            flex-grow: 1; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 20px; 
            outline: none;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            background-color: #00a884; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
        }

        /* MOBILE RESPONSIVENESS: If screen is smaller than 600px (a phone) */
        @media (max-width: 600px) {
            #header-controls {
                flex-direction: column; /* Stacks the header items vertically */
                gap: 10px;
                align-items: stretch;
            }
            .key-box { flex-direction: column; align-items: stretch;}
            .user-info { text-align: center; font-weight: bold;}
            #form { padding: 5px; gap: 5px; }
            #input { padding: 10px; font-size: 14px; }
            button { padding: 10px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="header-controls">
            <div class="key-box">
                <input id="secret-key" type="text" placeholder="Enter room password...">
            </div>
            <div class="user-info">
                <span id="display-name"></span>
            </div>
        </div>

        <ul id="messages"></ul>

        <form id="form" action="">
            <input type="file" id="file-input">
            <input id="input" autocomplete="off" placeholder="Type a message..." />
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
